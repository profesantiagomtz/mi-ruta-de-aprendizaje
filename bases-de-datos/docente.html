<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Docente · COBD Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --azul:#0E86C4;--azul-osc:#084F75;--azul-tinte:#E5F3FB;--ink:#152230;--gris:#5A6B78;
  --bg:#F1F6F9;--surface:#FFFFFF;--line:#D8E5EE;--ok:#0B6B3A;--amber:#8A5300;--amber-bg:#FFF4E0;
  --rojo:#A33B2E;--rojo-bg:#FBEAE7;--radius:10px;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6}
.wrap{max-width:1280px;margin:0 auto;padding:20px clamp(14px,3vw,32px) 80px}

/* topbar */
.top{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap}
.logo-mark{width:42px;height:42px;border-radius:9px;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:13px}
.top h1{font-size:19px;font-weight:700;letter-spacing:-.3px}
.top .sub{font-size:12.5px;color:var(--gris)}
.top .spacer{flex:1}
.top .who{font-size:13px;color:var(--gris);text-align:right}
.top .who strong{display:block;color:var(--ink);font-size:14px}

.btn{display:inline-flex;align-items:center;gap:7px;background:var(--azul);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer}
.btn:hover{background:var(--azul-osc)}
.btn.ghost{background:#fff;color:var(--azul-osc);border:1px solid #BcD7E6}
.btn.ghost:hover{background:var(--azul-tinte)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.danger{background:var(--rojo)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* login gate */
.gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(150deg,#063A57,#0A5D8C 55%,#0E86C4)}
.gate .card{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:32px}
.gate .logo-mark{margin-bottom:14px}
.gate h2{font-size:22px;margin-bottom:4px}
.gate p{color:var(--gris);font-size:14px;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-weight:600;font-size:13.5px;margin-bottom:5px}
input,select{width:100%;border:1px solid #C2D5E2;border-radius:8px;padding:10px 12px;font-size:14.5px;font-family:var(--sans);background:#fff;color:var(--ink)}
input:focus,select:focus{outline:2px solid var(--azul);border-color:var(--azul)}
.err{color:var(--rojo);background:var(--rojo-bg);border:1px solid #EFC9C2;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:12px;display:none}

/* filtros */
.filtros{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.filtros .field{margin-bottom:0;min-width:150px}
.filtros .field label{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--gris)}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;border-left:4px solid var(--azul)}
.stat .n{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1}
.stat .l{font-size:12.5px;color:var(--gris);margin-top:4px}

/* tabla */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:22px}
.panel h3{font-size:15px;padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.panel h3 .spacer{flex:1}
.tbl-scroll{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13.5px}
th{background:#F5FAFD;text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--azul-osc);border-bottom:2px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:var(--azul-tinte)}
td{padding:9px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
tr:hover td{background:#FAFCFE}
.cal{font-family:var(--mono);font-weight:600}
.cal.hi{color:var(--ok)}.cal.mid{color:var(--amber)}.cal.lo{color:var(--rojo)}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;display:inline-block}
.pill.env{background:var(--azul-tinte);color:var(--azul-osc);border:1px solid #C3DFF0}
.pill.prog{background:var(--amber-bg);color:var(--amber);border:1px solid #EDD9AE}
.pill.none{background:#EEF2F5;color:var(--gris);border:1px solid var(--line)}
.mini-prog{width:90px;height:7px;background:var(--line);border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle}
.mini-prog>span{display:block;height:100%;background:var(--azul);border-radius:99px}
.empty{padding:40px;text-align:center;color:var(--gris);font-size:14px}
.link{color:var(--azul-osc);font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px;background:none;border:none;font-family:var(--sans);font-size:13.5px}

/* modal detalle */
.modal{position:fixed;inset:0;z-index:90;background:rgba(14,31,23,.55);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.modal.show{display:flex}
.modal .box{background:#fff;border-radius:14px;max-width:820px;width:100%;padding:0;margin:auto}
.modal .box-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:14px;position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0}
.modal .box-head h2{font-size:19px}
.modal .box-head .sub{font-size:13px;color:var(--gris)}
.modal .box-head .x{margin-left:auto;background:none;border:none;font-size:24px;cursor:pointer;color:var(--gris);line-height:1}
.modal .box-body{padding:20px 24px 28px}
.det-cal{background:var(--azul-osc);color:#fff;border-radius:var(--radius);padding:18px 22px;font-size:15px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.det-cal .big{font-size:34px;font-weight:700;font-family:var(--mono)}
.act-block{border:1px solid var(--line);border-radius:9px;margin-bottom:12px;overflow:hidden}
.act-block .ab-head{background:#F5FAFD;padding:10px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:10px}
.act-block .ab-head .pts{margin-left:auto;font-family:var(--mono);font-size:13px}
.act-block .ab-body{padding:12px 14px;font-size:13px}
.act-block .ab-body .q{font-weight:600;color:var(--azul-osc);margin:8px 0 3px}
.act-block pre{background:#0A2233;color:#D6ECF8;font-family:var(--mono);font-size:12px;padding:10px 12px;border-radius:7px;overflow-x:auto;white-space:pre-wrap;margin:4px 0}
.fb-li{font-size:12px;margin:2px 0 2px 16px}
.fb-li.ok{color:var(--ok)}.fb-li.no{color:var(--rojo)}

@media(max-width:680px){.top .who{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="gate" id="gate">
  <div class="card">
    <div class="logo-mark">SQL</div>
    <h2>Panel Docente</h2>
    <p>COBD Classroom · Acceso exclusivo del docente. Inicia sesión con tu cuenta autorizada.</p>
    <div class="err" id="loginErr"></div>
    <div class="field"><label>Correo</label><input type="email" id="d_correo" placeholder="profesor@tam.conalep.edu.mx" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="d_pass" placeholder="Tu contraseña" autocomplete="current-password"></div>
    <button class="btn" style="width:100%;justify-content:center" onclick="login()" id="btnLogin">Entrar al panel</button>
  </div>
</div>

<div class="wrap" id="app" style="display:none">
  <div class="top">
    <div class="logo-mark">SQL</div>
    <div>
      <h1>Panel Docente</h1>
      <div class="sub">COBD Classroom · Construcción de Bases de Datos</div>
    </div>
    <div class="spacer"></div>
    <div class="who"><strong id="docNombre"></strong><span id="docCorreo"></span></div>
    <button class="btn ghost sm" onclick="cerrar()">Cerrar sesión</button>
  </div>

  <div class="filtros">
    <div class="field">
      <label>Cuaderno</label>
      <select id="fCuaderno" onchange="render()">
        <option value="ra21">RA 2.1 · Consultas y disparadores</option>
        <option value="ra22">RA 2.2 · Vistas, formularios y reportes</option>
      </select>
    </div>
    <div class="field">
      <label>Grupo</label>
      <select id="fGrupo" onchange="render()">
        <option value="">Todos</option>
        <option value="410">410</option>
        <option value="411">411</option>
      </select>
    </div>
    <div class="field">
      <label>Buscar alumno</label>
      <input type="text" id="fBuscar" placeholder="Nombre o matrícula…" oninput="render()">
    </div>
    <div class="spacer" style="flex:1"></div>
    <button class="btn ghost" onclick="cargarTodo()">⟲ Actualizar datos</button>
    <button class="btn ghost" onclick="exportarCSV()">⬇ Exportar a Excel (CSV)</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="panel">
    <h3>
      <span id="tituloTabla">Alumnos</span>
      <span class="spacer"></span>
      <span style="font-size:12px;color:var(--gris);font-weight:400">Clic en un encabezado para ordenar · clic en "Ver" para el detalle</span>
    </h3>
    <div class="tbl-scroll">
      <table id="tabla">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="vacio" style="display:none">No hay alumnos que coincidan con los filtros.</div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal" id="modal">
  <div class="box">
    <div class="box-head">
      <div>
        <h2 id="m_nombre"></h2>
        <div class="sub" id="m_sub"></div>
      </div>
      <button class="x" onclick="cerrarModal()">×</button>
    </div>
    <div class="box-body" id="m_body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const SUPABASE_URL = 'https://cmhnuuxgwrpkhutylnzs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8A2VQZa5N2NBP1li532sJQ_AACo-3_v';
let sb = null, datos = [], sortKey = 'nombre', sortDir = 1;

const ACTS = {
  ra21: [['act1','Act. 1 · SELECT y WHERE',20],['act2','Act. 2 · INSERT/UPDATE/DELETE',25],['act3','Act. 3 · AND e INNER JOIN',25],['act4','Act. 4 · Disparadores',20]],
  ra22: [['act1','Act. 1 · Vistas (CREATE VIEW)',35],['act2','Act. 2 · Formularios',25],['act3','Act. 3 · Reportes',30]]
};
const SECCIONES = {
  ra21: ['intro','ddl','conceptos','ejemplo','act1','act2','act3','act4','simulador','bitacora','evaluacion'],
  ra22: ['intro','ddl','conceptos','ejemplo','act1','act2','act3','simulador','bitacora','evaluacion']
};
const RESP_KEYS = {
  ra21: {act1:['a1_tabla','a1_join','a1_sql','a1_just'],act2:['a2_sqlI','a2_sqlU','a2_sqlD','a2_reflex'],act3:['a3_tablas','a3_llave','a3_sql','a3_just'],act4:['a4_momento','a4_evento','a4_sql','a4_expl']},
  ra22: {act1:['a1_def','a1_dup','a1_sqlC','a1_sqlU','a1_sqlD','a1_just'],act2:['a2_btn','a2_btn2','a2_sql','a2_pk'],act3:['a3_avg','a3_count','a3_sql','a3_just']}
};
const RESP_ETIQ = {
  a1_tabla:'Tabla identificada',a1_join:'¿Requiere JOIN?',a1_sql:'Consulta SQL',a1_just:'Justificación',
  a2_sqlI:'INSERT',a2_sqlU:'UPDATE',a2_sqlD:'DELETE',a2_reflex:'Reflexión',
  a3_tablas:'Núm. de tablas',a3_llave:'Llave',a3_sql:'Consulta SQL',a3_just:'Justificación',
  a4_momento:'Momento',a4_evento:'Evento',a4_sql:'CREATE TRIGGER',a4_expl:'Explicación',
  a1_def:'Definición de vista',a1_dup:'¿Datos actualizados?',a1_sqlC:'CREATE VIEW',a1_sqlU:'Uso de la vista',a1_sqlD:'DROP VIEW',
  a2_btn:'Botón Guardar',a2_btn2:'Botón Actualizar',a2_sql:'SQL del formulario',a2_pk:'Validaciones',
  a3_avg:'Función promedio',a3_count:'Función conteo',
  bit1:'Bitácora · ¿Qué aprendí?',bit2:'Bitácora · Dificultades',bit3:'Bitácora · Aplicación'
};

function initSB(){ try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); return true; }catch(e){ return false; } }

async function login(){
  const err = document.getElementById('loginErr');
  const correo = document.getElementById('d_correo').value.trim().toLowerCase();
  const pass = document.getElementById('d_pass').value;
  const btn = document.getElementById('btnLogin');
  if(!sb && !initSB()){ err.textContent='No se pudo conectar al servidor.'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Conectando…'; err.style.display='none';
  const { data, error } = await sb.auth.signInWithPassword({ email:correo, password:pass });
  if(error){ err.textContent='Correo o contraseña incorrectos.'; err.style.display='block'; btn.disabled=false; btn.textContent='Entrar al panel'; return; }
  const { data:doc } = await sb.from('docentes').select('*').eq('id', data.user.id).single();
  if(!doc){
    err.textContent='Esta cuenta no tiene permisos de docente. Solicita ser dado de alta en la tabla docentes.';
    err.style.display='block'; await sb.auth.signOut(); btn.disabled=false; btn.textContent='Entrar al panel'; return;
  }
  document.getElementById('docNombre').textContent = doc.nombre || 'Docente';
  document.getElementById('docCorreo').textContent = correo;
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  cargarTodo();
}

async function cerrar(){ if(sb) await sb.auth.signOut(); location.reload(); }

async function cargarTodo(){
  document.getElementById('tbody').innerHTML = '<tr><td colspan="9" class="empty">Cargando datos desde la nube…</td></tr>';
  const [perfiles, avances, entregas, envios] = await Promise.all([
    sb.from('perfiles').select('*'),
    sb.from('avances').select('*'),
    sb.from('entregas').select('*'),
    sb.from('envios').select('*')
  ]);
  const P = perfiles.data||[], A = avances.data||[], E = entregas.data||[], EN = envios.data||[];
  datos = P.map(p=>{
    const ent = {}; E.filter(e=>e.user_id===p.id).forEach(e=>{ ent[e.cuaderno] = ent[e.cuaderno]||{}; ent[e.cuaderno][e.actividad]=e; });
    const av = {}; A.filter(a=>a.user_id===p.id).forEach(a=>{ av[a.cuaderno]=a.estado; });
    const env = {}; EN.filter(x=>x.user_id===p.id).forEach(x=>{ env[x.cuaderno]=x; });
    return { ...p, ent, av, env };
  });
  render();
}

function calcular(alu, cuad){
  const acts = ACTS[cuad], ent = alu.ent[cuad]||{}, est = alu.av[cuad]||{};
  let pts=0, max=0, entregadas=0;
  acts.forEach(([id,,mx])=>{ max+=mx; if(ent[id]){ pts+=ent[id].pts; entregadas++; } });
  // bitácora (10)
  max+=10; let bitPts=0;
  const R = est.respuestas||{};
  ['bit1','bit2','bit3'].forEach((k,i)=>{ if((R[k]||'').trim().length>=60) bitPts += [3,3,4][i]; });
  pts+=bitPts;
  const secs = SECCIONES[cuad], vis = est.visitadas||{}, guard = est.guardadas||{};
  const visN = secs.filter(x=>vis[x]).length;
  const actN = acts.filter(([id])=>ent[id]).length + (['bit1','bit2','bit3'].every(k=>(R[k]||'').trim().length>=10)?1:0);
  const prog = Math.round((visN/secs.length)*40 + (actN/(acts.length+1))*60);
  return { pts, max, entregadas, totalActs:acts.length, bitPts, prog, enviado:!!alu.env[cuad] };
}

function render(){
  const cuad = document.getElementById('fCuaderno').value;
  const grupo = document.getElementById('fGrupo').value;
  const q = document.getElementById('fBuscar').value.trim().toLowerCase();
  let lista = datos.filter(a=>{
    if(grupo && a.grupo!==grupo) return false;
    if(q && !((a.nombre||'').toLowerCase().includes(q) || (a.matricula||'').toLowerCase().includes(q) || (a.correo||'').toLowerCase().includes(q))) return false;
    return true;
  }).map(a=>({ a, c: calcular(a, cuad) }));

  // ordenar
  lista.sort((x,y)=>{
    let vx, vy;
    if(sortKey==='nombre'){ vx=(x.a.nombre||'').toLowerCase(); vy=(y.a.nombre||'').toLowerCase(); }
    else if(sortKey==='grupo'){ vx=x.a.grupo||''; vy=y.a.grupo||''; }
    else if(sortKey==='prog'){ vx=x.c.prog; vy=y.c.prog; }
    else if(sortKey==='cal'){ vx=x.c.pts; vy=y.c.pts; }
    else if(sortKey==='ent'){ vx=x.c.entregadas; vy=y.c.entregadas; }
    else { vx=0; vy=0; }
    if(vx<vy) return -1*sortDir; if(vx>vy) return 1*sortDir; return 0;
  });

  // stats
  const total = lista.length;
  const enviados = lista.filter(l=>l.c.enviado).length;
  const promedio = total ? Math.round(lista.reduce((s,l)=>s+l.c.pts,0)/total) : 0;
  const sinIniciar = lista.filter(l=>l.c.prog===0).length;
  document.getElementById('stats').innerHTML =
    stat(total,'Alumnos en vista') + stat(enviados+' / '+total,'Reportes enviados') +
    stat(promedio+' / 100','Promedio del grupo') + stat(sinIniciar,'Sin iniciar');
  document.getElementById('tituloTabla').textContent = 'Alumnos · ' + (cuad==='ra21'?'RA 2.1':'RA 2.2') + (grupo?(' · Grupo '+grupo):'');

  // encabezados
  document.getElementById('thead').innerHTML = '<tr>'+
    th('nombre','Alumno')+th('grupo','Grupo')+'<th>Turno</th>'+th('prog','Avance')+
    th('ent','Entregadas')+th('cal','Calificación')+'<th>Estado</th><th>Acciones</th></tr>';

  const tb = document.getElementById('tbody');
  document.getElementById('vacio').style.display = lista.length?'none':'block';
  tb.innerHTML = lista.map(({a,c})=>{
    const clase = c.pts>=Math.round(c.max*0.9)?'hi':c.pts>=Math.round(c.max*0.7)?'mid':'lo';
    const estado = c.enviado?'<span class="pill env">Enviado</span>':c.prog>0?'<span class="pill prog">En proceso</span>':'<span class="pill none">Sin iniciar</span>';
    return '<tr>'+
      '<td><strong>'+esc(a.nombre)+'</strong><br><span style="color:var(--gris);font-size:12px">'+(a.matricula?('Mat. '+esc(a.matricula)+' · '):'')+esc(a.correo)+'</span></td>'+
      '<td>'+esc(a.grupo)+'</td><td>'+esc(a.turno)+'</td>'+
      '<td><span class="mini-prog"><span style="width:'+c.prog+'%"></span></span> '+c.prog+'%</td>'+
      '<td>'+c.entregadas+' / '+c.totalActs+'</td>'+
      '<td class="cal '+clase+'">'+c.pts+' / '+c.max+'</td>'+
      '<td>'+estado+'</td>'+
      '<td><button class="link" onclick="verDetalle(\''+a.id+'\')">Ver detalle</button></td>'+
    '</tr>';
  }).join('');
}

function stat(n,l){ return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
function th(key,label){ const arrow = sortKey===key?(sortDir>0?' ▲':' ▼'):''; return '<th onclick="setSort(\''+key+'\')">'+label+arrow+'</th>'; }
function setSort(k){ if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; } render(); }
function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function verDetalle(uid){
  const cuad = document.getElementById('fCuaderno').value;
  const alu = datos.find(a=>a.id===uid); if(!alu) return;
  const c = calcular(alu, cuad), ent = alu.ent[cuad]||{}, est = alu.av[cuad]||{}, R = est.respuestas||{};
  document.getElementById('m_nombre').textContent = alu.nombre;
  document.getElementById('m_sub').textContent = (alu.matricula?('Matrícula '+alu.matricula+' · '):'')+'Grupo '+alu.grupo+' · Turno '+alu.turno+' · '+alu.correo+' · '+(cuad==='ra21'?'RA 2.1':'RA 2.2');
  let h = '<div class="det-cal"><div><div class="big">'+c.pts+' / '+c.max+'</div><div style="font-size:12px;opacity:.85">calificación actual</div></div>'+
    '<div style="font-size:13px;line-height:1.7">Avance: <strong>'+c.prog+'%</strong><br>Actividades entregadas: <strong>'+c.entregadas+' / '+c.totalActs+'</strong><br>'+
    (c.enviado?('Reporte ENVIADO · folio '+esc(alu.env[cuad].folio)+'<br>'+new Date(alu.env[cuad].fecha).toLocaleString('es-MX')):'Aún no envía su reporte')+'</div>'+
    '<div style="margin-left:auto;display:flex;flex-direction:column;gap:8px">'+
    '<button class="btn sm" onclick="boletaPDF(\''+uid+'\',\''+cuad+'\')">⬇ Boleta '+(c.enviado?'final':'parcial')+' (PDF)</button>'+
    '</div></div>';

  ACTS[cuad].forEach(([id,nom,mx])=>{
    const e = ent[id];
    h += '<div class="act-block"><div class="ab-head">'+esc(nom)+
      '<span class="pts">'+(e?(e.pts+' / '+mx):('— / '+mx))+'</span>'+
      (e?('<button class="btn danger sm" style="margin-left:10px" onclick="liberar(\''+uid+'\',\''+cuad+'\',\''+id+'\')">Liberar intento</button>'):'')+
      '</div>';
    if(e){
      h += '<div class="ab-body">';
      (e.fb||[]).forEach(f=> h += '<div class="fb-li '+(f.ok?'ok':'no')+'">'+(f.ok?'✓ ':'✗ ')+esc(f.label)+' ('+f.pts+')</div>');
      const keys = RESP_KEYS[cuad][id]||[];
      keys.forEach(k=>{
        const val = (e.respuestas&&e.respuestas[k])||R[k]||'';
        if(!val) return;
        const esSQL = /sql|trigger|view/i.test(k);
        h += '<div class="q">'+esc(RESP_ETIQ[k]||k)+'</div>'+(esSQL?('<pre>'+esc(val)+'</pre>'):('<div>'+esc(val)+'</div>'));
      });
      h += '</div>';
    } else {
      h += '<div class="ab-body" style="color:var(--gris)">Sin entregar.</div>';
    }
    h += '</div>';
  });

  // bitácora
  h += '<div class="act-block"><div class="ab-head">Bitácora<span class="pts">'+c.bitPts+' / 10</span></div><div class="ab-body">';
  ['bit1','bit2','bit3'].forEach(k=>{ h += '<div class="q">'+esc(RESP_ETIQ[k])+'</div><div>'+esc(R[k]||'—')+'</div>'; });
  h += '</div></div>';

  document.getElementById('m_body').innerHTML = h;
  document.getElementById('modal').classList.add('show');
}
function cerrarModal(){ document.getElementById('modal').classList.remove('show'); }

async function liberar(uid, cuad, act){
  if(!confirm('¿Liberar el intento de esta actividad? El alumno podrá volver a responderla y entregarla.\n\nEsta acción borra su entrega actual del servidor.')) return;
  const { error } = await sb.from('entregas').delete().eq('user_id',uid).eq('cuaderno',cuad).eq('actividad',act);
  if(error){ alert('No se pudo liberar: '+error.message); return; }
  await cargarTodo();
  verDetalle(uid);
}

function exportarCSV(){
  const cuad = document.getElementById('fCuaderno').value, grupo = document.getElementById('fGrupo').value;
  const acts = ACTS[cuad];
  let lista = datos.filter(a=>!grupo||a.grupo===grupo).map(a=>({a,c:calcular(a,cuad),ent:a.ent[cuad]||{}}));
  let head = ['Nombre','Matricula','Correo','Grupo','Turno','Avance%'].concat(acts.map(x=>x[1])).concat(['Bitacora','Total','Estado']);
  let rows = lista.map(({a,c,ent})=>{
    let r = [a.nombre,a.matricula||'',a.correo,a.grupo,a.turno,c.prog];
    acts.forEach(([id,,mx])=> r.push(ent[id]?ent[id].pts:''));
    r.push(c.bitPts); r.push(c.pts); r.push(c.enviado?'Enviado':c.prog>0?'En proceso':'Sin iniciar');
    return r;
  });
  let csv = [head].concat(rows).map(r=>r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='Calificaciones_'+cuad+(grupo?('_'+grupo):'')+'.csv'; a.click();
}

function boletaPDF(uid, cuad){
  const alu = datos.find(a=>a.id===uid); if(!alu) return;
  const c = calcular(alu, cuad), ent = alu.ent[cuad]||{}, est = alu.av[cuad]||{}, R = est.respuestas||{};
  const { jsPDF } = window.jspdf; const doc = new jsPDF({unit:'mm',format:'letter'});
  const M=14, W=188; let y=16;
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.text('COBD Classroom · Boleta '+(c.enviado?'Final':'Parcial'), M, y); y+=5.5;
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(90,107,120);
  doc.text('Construcción de Bases de Datos (COBD-20) · '+(cuad==='ra21'?'RA 2.1 · Evidencia 2.1.1 (15%)':'RA 2.2 · Evidencia 2.2.1 (10%)')+' · CONALEP', M, y); y+=3.6;
  doc.text('Proyecto integrador: Sistema de Administración Estudiantil', M, y); y+=3;
  doc.setDrawColor(14,134,196); doc.setLineWidth(0.7); doc.line(M,y,M+W,y); y+=6;
  doc.setTextColor(21,34,48); doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.text(alu.nombre, M, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.text('Grupo '+alu.grupo+' · Turno '+alu.turno, M+W, y, {align:'right'}); y+=4.5;
  doc.setFontSize(8); doc.setTextColor(90,107,120); doc.text((alu.matricula?('Matrícula '+alu.matricula+' · '):'')+alu.correo+' · Generada: '+new Date().toLocaleString('es-MX'), M, y); y+=6;
  doc.setFillColor(8,79,117); doc.roundedRect(M,y,W,13,2,2,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(255,255,255);
  doc.text('CALIFICACIÓN: '+c.pts+' / '+c.max, M+5, y+8.7);
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(c.enviado?('ENVIADO · '+esc(alu.env[cuad].folio)):'PARCIAL · sin envío', M+W-4, y+8.2, {align:'right'}); y+=19;
  doc.setFillColor(229,243,251); doc.rect(M,y,W,6.2,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(8,79,117);
  doc.text('Componente', M+2, y+4.2); doc.text('Puntos', M+120, y+4.2); doc.text('Estado', M+150, y+4.2); y+=6.2;
  doc.setFont('helvetica','normal'); doc.setTextColor(21,34,48);
  ACTS[cuad].forEach(([id,nom,mx])=>{
    const e=ent[id];
    doc.setDrawColor(216,229,238); doc.line(M,y+5.6,M+W,y+5.6);
    doc.text(nom.slice(0,52), M+2, y+4); doc.text(e?(e.pts+' / '+mx):('— / '+mx), M+120, y+4);
    doc.text(e?'Entregada':'Pendiente', M+150, y+4); y+=5.8;
  });
  doc.setDrawColor(216,229,238); doc.line(M,y+5.6,M+W,y+5.6);
  doc.text('Bitácora', M+2, y+4); doc.text(c.bitPts+' / 10', M+120, y+4); y+=10;
  doc.setDrawColor(21,34,48); doc.setLineWidth(0.3);
  doc.line(M+8,y+18,M+78,y+18); doc.line(M+110,y+18,M+180,y+18);
  doc.setFontSize(7.5); doc.text('Firma del alumno', M+30, y+22); doc.text('Ing. Santiago Martínez González', M+118, y+22);
  doc.save('Boleta_'+(c.enviado?'Final':'Parcial')+'_'+cuad+'_'+(alu.nombre||'alumno').replace(/\s+/g,'_')+'.pdf');
}
